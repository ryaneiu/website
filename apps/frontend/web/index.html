<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LT-Forum</title>

    <!-- Core styles for basic loading screen -->
    <style>
        * {
            font-family: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'
        }

        body,
        html {
            margin: 0;
            padding: 0;

        }

        .dark-background {
            background-color: #18181b;
        }

        .spinner-container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 99;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 20px;
            /* w-5 */
            height: 20px;
            /* h-5 */

            border-width: 3px;
            border-style: solid;

            border-color: black;
            /* border-black */
            border-top-color: transparent;

            border-radius: 9999px;
            /* rounded-full */

            animation: spin 1s linear infinite;
        }

        .spinner-dark {
            border-color: white !important;
            border-top-color: transparent !important;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .bootstrap-header-title {
            color: light-dark(#000, #fff);
        }

        .bootstrap-error-message {
            position: fixed;
            inset: 0;
            z-index: 100;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bootstrap-wrapper {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            text-align: center;
        }

        .bootstrap-text {
            max-width: 400px;
            gap: 4px;
            display: flex;
            flex-direction: column;
        }

        .bootstrap-title {
            font-weight: bold;
            font-size: 18px;
            margin: 0;
            color: light-dark(#000, #fff);
        }

        .bootstrap-subtitle {
            font-size: 14px;
            margin: 0;
            color: light-dark(#000, #fff);
        }

        .bootstrap-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bootstrap-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;

            padding: 8px 14px;
            font-size: 14px;

            border: none;
            border-radius: 6px;
            cursor: pointer;

            background: #000;
            color: #fff;
        }

        .dark-background .bootstrap-button {
            background: #fff;
            color: #000;
        }

        .bootstrap-icon {
            display: flex;
        }

        .bootstrap-footer {
            font-size: 12px;
            opacity: 0.6;
            margin: 0;
            color: light-dark(#000, #fff);
        }
    </style>

    <script>
        // core script
        (function () {
            const storedIsDarkMode = localStorage.getItem("color-scheme");
            const systemIsDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const isDark = storedIsDarkMode === "dark" || (!storedIsDarkMode && systemIsDarkMode);

            if (isDark) {
                // Apply classes to documentElement so it's ready before <body> exists
                document.documentElement.classList.add("dark-background");
                document.documentElement.style.colorScheme = "dark";
            } else {
                document.documentElement.style.colorScheme = "light";
            }
        })();
    </script>

</head>

<body>

    <div class="spinner-container" id="core-spinner-container">
        <div class="spinner" id="core-spinner"></div>
        <div class="bootstrap-error-message" id="bootstrap-error-message" style="display:none;">
            <div class="bootstrap-wrapper">

                <div class="bootstrap-text">
                    <p class="bootstrap-title">Something went wrong</p>
                    <p class="bootstrap-subtitle">
                        We couldn't load what you were looking for. This may be temporary.
                    </p>
                </div>

                <div class="bootstrap-actions">
                    <button class="bootstrap-button" id="bootstrap-retry">
                        <span class="bootstrap-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"
                                fill="currentColor">
                                <path
                                    d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z" />
                            </svg>
                        </span>
                        Retry
                    </button>

                    <p class="bootstrap-footer">
                        If this keeps happening, please contact us.
                    </p>
                </div>

            </div>
        </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx" onerror="window.__BUNDLE_FAILED__ = true;"></script>

    <script>
        (function () {
            const isDark = document.documentElement.classList.contains("dark-background");
            if (isDark) {
                document.getElementById("core-spinner").classList.add("spinner-dark");
                document.body.classList.add("dark-background");
            }
        })();
    </script>
    <script>
        document.getElementById("bootstrap-retry")?.addEventListener("click", () => {
            window.location.reload();
        });
        setInterval(() => {
            if (window.__BUNDLE_FAILED__) {
                const errorMessage = document.querySelector("#bootstrap-error-message");
                if (errorMessage) {
                    errorMessage.style.display = "flex";
                }

                const coreSpinner = document.querySelector("#core-spinner");
                if (coreSpinner) {
                    coreSpinner.style.display = "none";
                }
            }
        }, 500);

        setTimeout(() => {
            const root = document.querySelector("#root");
            if (!root) {
                window.__BUNDLE_FAILED__ = true;
            }
            if (root.childNodes.length == 0) {
                window.__BUNDLE_FAILED__ = true;
            }
        }, 15_000)
    </script>
</body>

</html>
